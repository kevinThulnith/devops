apiVersion: apps/v1
kind: Deployment
metadata:
  name: fms-prod-backend
  namespace: fms-prod
  labels:
    app: fms-prod-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fms-prod-backend
  template:
    metadata:
      labels:
        app: fms-prod-backend
    spec:
      # Wait for dependencies before starting backend
      initContainers:
        - name: wait-for-database
          image: postgres:14-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h fms-prod-database -p 5432 -U $POSTGRES_USER; do
                echo "Database is unavailable - sleeping"
                sleep 2
              done
              echo "Database is up!"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fms-prod-secrets
                  key: POSTGRES_USER

        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until redis-cli -h fms-prod-redis -p 6379 ping; do
                echo "Redis is unavailable - sleeping"
                sleep 2
              done
              echo "Redis is up!"

      containers:
        - name: backend
          image: fms-prod-fms-prod-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fms-prod-config
            - secretRef:
                name: fms-prod-secrets
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: logs
              mountPath: /app/logs
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: fms-prod-backend-media
        - name: logs
          persistentVolumeClaim:
            claimName: fms-prod-backend-logs

---
apiVersion: v1
kind: Service
metadata:
  name: fms-prod-backend
  namespace: fms-prod
spec:
  type: ClusterIP
  selector:
    app: fms-prod-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
