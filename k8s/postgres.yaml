apiVersion: apps/v1
kind: Deployment
metadata:
  name: fms-prod-database
  namespace: fms-prod
  labels:
    app: fms-prod-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fms-prod-database
  template:
    metadata:
      labels:
        app: fms-prod-database
    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: fms-prod-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fms-prod-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fms-prod-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: logs
              mountPath: /var/log/postgresql
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: fms-prod-database-data
        - name: logs
          persistentVolumeClaim:
            claimName: fms-prod-database-logs

---
apiVersion: v1
kind: Service
metadata:
  name: fms-prod-database
  namespace: fms-prod
spec:
  type: ClusterIP
  selector:
    app: fms-prod-database
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
