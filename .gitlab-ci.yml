stages:
  - test
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

frontend-ci:
  stage: test
  image: node:24-alpine
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/frontend/.npm"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run build

backend-ci:
  stage: test
  image: python:3.14
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    SECRET_KEY: ci-secret-key
    DEBUG: "False"
    ALLOWED_HOSTS: localhost,127.0.0.1
    DATABASE_ENGINE: sqlite3
    DATABASE_NAME: db.sqlite3
    REDIS_HOST: localhost
    REDIS_PORT: "6379"
    CORS_ORIGINS: http://localhost:3000
    GOOGLE_CLIENT_ID: ci-placeholder
    GOOGLE_CLIENT_SECRET: ci-placeholder
  cache:
    key:
      files:
        - backend/uv.lock
    paths:
      - .cache/pip/
      - backend/.venv/
  script:
    - apt-get update -qq && apt-get install -y -qq gcc libpq-dev
    - cd backend
    - pip install --disable-pip-version-check uv
    - mkdir -p /app/logs
    - uv sync --frozen
    - uv run python manage.py test --noinput
    - uv run python manage.py check --deploy --fail-level=ERROR

build-and-push:
  stage: build
  image: docker:24.0.7
  services:
    - name: docker:24.0.7-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - frontend-ci
    - backend-ci
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - docker build -t "$DOCKERHUB_USERNAME/fms-prod-backend:latest" ./backend
    - docker tag "$DOCKERHUB_USERNAME/fms-prod-backend:latest" "$DOCKERHUB_USERNAME/fms-prod-backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-backend:latest"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-backend:$CI_COMMIT_SHORT_SHA"
    - docker build --build-arg VITE_CLIENT_ID="$VITE_CLIENT_ID" -t "$DOCKERHUB_USERNAME/fms-prod-frontend:latest" ./frontend
    - docker tag "$DOCKERHUB_USERNAME/fms-prod-frontend:latest" "$DOCKERHUB_USERNAME/fms-prod-frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-frontend:latest"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-frontend:$CI_COMMIT_SHORT_SHA"
    - docker build -t "$DOCKERHUB_USERNAME/fms-prod-proxy:latest" ./proxy
    - docker tag "$DOCKERHUB_USERNAME/fms-prod-proxy:latest" "$DOCKERHUB_USERNAME/fms-prod-proxy:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-proxy:latest"
    - docker push "$DOCKERHUB_USERNAME/fms-prod-proxy:$CI_COMMIT_SHORT_SHA"
